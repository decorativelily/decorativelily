<html lang="en">
  <head>

    <link rel="icon" href="images/decorativelilyalt.JPG" />

    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Luxury Picnics In Dallas-Fort Worth"
    />
    <meta name="keywords" content="Decorativelily, Decoratively, Luxury, Picnic, Dallas, Fort Worth, DFW" />

    <body>
    <form name="contact-form" netlify netlify-honeypot="bot-field" action="/" hidden>
      <input type="text" name="name" />
      <input type="text" name="email" />
      <input type="text" name="phoneNumber" />
      <select name="occassion"></select>
      <input name="occassion" value=""></input>
      <option name="occassion" value="anniversary">Anniversary</option>
      <option name="occassion" value="birthday">Birthday</option>
      <option name="occassion" value="graduation">Graduation</option>
      <option name="occassion" value="wedding">Wedding</option>
      <input type="date" name="date" />
      <input type="text" name="location" />
      <input type="text" name="time" />
      <select name="guestCount"></select>
      <input name="guestCount" value=""></input>
      <select name="guestCount" value="2">2</select>
      <select name="guestCount" value="4">4</select>
      <select name="guestCount" value="6">6</select>
      <select name="guestCount" value="8">8</select>
      <select name="guestCount" value="10">10</select>
      <select name="guestCount" value="12">12</select>
      <input type="checkbox" name="addOns" value="balloon" />
      <input type="checkbox" name="addOns" value="charcuterieBoard" />
      <input type="file" name="file" value="file"/>
      <textarea name="message"></textarea>
    </form>
    <form name="contact-form" netlify netlify-honeypot="bot-field" action="/" hidden>
      <input type="text" name="name" color="pink"/>
      <input type="text" name="email" />
      <input type="text" name="phoneNumber" />
      <textarea name="message"></textarea>
    </form>
    <form name="contact-form" netlify netlify-honeypot="bot-field" action="/" hidden>
      <input type="text" name="email" />
    </form>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
